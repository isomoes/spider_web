{% extends "base.html" %}

{% block title %}Access Required{% endblock %}

{% block header %}Access Required{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">Enter Access Key</h5>
                <form method="post" action="/access">
                    <div class="mb-3">
                        <label for="access_key" class="form-label">Server Access Key</label>
                        <input type="password" class="form-control" id="access_key" name="access_key" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enter</button>
                </form>
            </div>
        </div>

        {% if error %}
        <div class="alert alert-danger mt-3" role="alert">
            {{ error }}
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
